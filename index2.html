<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <link rel="stylesheet" href="CSS.css">
</head>
<body>

    <h1>Photo Gallery</h1>

    <div class="gallery">
        <img src="" alt="Photo 1">
        <img src="https://picsum.photos/id/1016/300/200" alt="Photo 2">
        <img src="https://picsum.photos/id/1018/300/200" alt="Photo 3">
        <img src="https://picsum.photos/id/1020/300/200" alt="Photo 4">
        <img src="https://picsum.photos/id/1024/300/200" alt="Photo 5">
        <img src="https://picsum.photos/id/1025/300/200" alt="Photo 6">
    </div>

    <div class="popup" id="popup">
        <span id="close">&times;</span>
        <img id="popup-img" src="" alt="">
    </div>

    <script src="js.js"></script>
</body>
</html>
